<div class="mobile:flex mobile:flex-col w-full h-full overflow-hidden mobile:text-sm bg-gray-100 min-h-screen p-8">
    <!-- Portfolio Header -->
    <div class="text-left mobile:-mb-25 mobile:pl-0 mobile:-ml-5">
        <h1 class="section-title">Portfolio</h1>
        <div class="flex justify-center w-full">
            <h2 class="mobile:font-medium text-4xl font-bold text-gray-900 mt-2 font-montserrat">My Work</h2>
            <div class="mobile:my-10 mobile:ml-0  w-1/2 bg-gray-900 h-1 rounded md:mt-7 md:ml-20 "></div>
        </div>
    </div>

    <!-- Project Section -->
    <div *ngFor="let project of projects"
        class="w-full mobile:h-full mobile:text-sm mobile:p-0 mobile:-ml-5 md:flex md:flex-col md:max-w-7xl mx-auto mt-12 p-8">
        <!-- Project Title -->
        <h3 class="mobile:text-sm mobile:pl-10 mobile:-ml-10 w-full md:text-2xl font-bold text-gray-800">
            {{ project.title }}
        </h3>

        <!-- Video Preview -->
        <div class="w-full flex mx-4">
            <div class="mt-6 md:w-2/5">
                <div class="relative w-full overflow-hidden aspect-video rounded-lg shadow-md">
                    <!-- <iframe [attr.src]="project.media" class="absolute inset-0 w-full h-full" frameborder="0"
                        allowfullscreen></iframe> -->
                    <img [attr.src]="project.media" class="absolute inset-0 w-full h-full" frameborder="0"
                        allowfullscreen>
                </div>
            </div>

            <!-- Contribution List -->
            <div
                class="mobile:ml-0 mobile:w-full mobile:shadow-lg mobile:rounded-lg mobile:border mt-6 flex md:flex-row md:justify-between ml-20">
                <!-- Left: Contributions -->
                <div class="mobile:w-full mobile:flex-col sm:w-3/3">
                    <ul class=" w-full list-disc pl-6 text-gray-700 space-y-2">
                        <li *ngFor="let contributions of project.achievements">
                            {{contributions.description}}
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

</div>
