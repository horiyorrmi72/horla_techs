<div class="mobile:flex-col mobile:py-2 flex flex-row w-full bg-contact_color h-full py-10">
    <div class="flex flex-col gap-20 w-1/2 justify-center items-center mobile:w-full mobile:gap-10">
        <div class=" flex flex-col gap-20 px-20 py-20">
            <h4 class="font-3xl font-robotoSlab font-bold text-4xl text-white">Wanna Talk?</h4>
            <div class="w-2/3 text-white font-robotoSlab mobile:w-full">
                <p>Contact me with any questions or just to say a few nice words ... or mean ones. Up to you .... free
                    will
                    and all</p>
            </div>
        </div>
    </div>
    <div class="flex font-openSans  w-1/3 p-4 mobile:w-full">
        <form action="" class="flex flex-col py-20 w-full mobile:py-10">
            <label for="name" class="text-white">Name</label>
            <input type="text" name="" id="" placeholder="Your Name" class="rounded-lg h-10 shadow border-none px-5 active:border-blue-700">

            <label for="email" class="text-white">Email</label>
            <input type="email" name="" id="" placeholder="Your Email" class="rounded-lg h-10 shadow border-none px-5 active:border-blue-700">

            <label for="message" class="text-white">Message</label>
            <textarea name="message" id="" placeholder="Enter your message" class="w-full rounded-lg h-20 bg-none px-5 shadow border-none active:border-blue-700"></textarea>

            <input type="button" value="Submit" class="w-1/3 bg-white my-4 text-blue-800 rounded-xl h-10 hover:cursor-pointer shadow border-none active:border-blue-700">
        </form>
    </div>
</div>
